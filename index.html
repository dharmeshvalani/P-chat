<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* CENTER SCREEN */
.join {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 15px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 400px;
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
}

/* INPUT FIX */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 16px;
}

/* CHAT UI */
.container {
  display: flex;
  flex-direction: column;
  height: 100dvh; /* FIX */
}

  .chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  scroll-behavior: smooth;
}

.input-box {
  position: sticky;
  bottom: 0;
  background: rgba(30,41,59,0.9);
  padding: 10px;
}

input {
  font-size: 16px;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  max-width: 75%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 12px;
  word-wrap: break-word;
}

.sent {
  background: #2563eb;
  align-self: flex-end;
}

.received {
  background: #1e293b;
  align-self: flex-start;
}

.input-box {
  display: flex;
  padding: 10px;
}

.input-box input {
  flex: 1;
  margin: 0;
}

.input-box button {
  width: auto;
  margin-left: 10px;
}

  .chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  scroll-behavior: smooth;
}

.input-box {
  position: sticky;
  bottom: 0;
  background: rgba(30,41,59,0.9);
  padding: 10px;
}

input {
  font-size: 16px;
}
  
</style>
</head>

<body>

<div id="joinScreen" class="join">
  <div class="card">
    <h3>Join Chat</h3>
    <input id="username" placeholder="Enter name">
    <input id="room" placeholder="Room code">
    <button onclick="join()">Join</button>
  </div>
</div>

<div id="chatScreen" class="container" style="display:none;">
  <div class="header">
    Chat Room <span id="status">● Offline</span>
  </div>

  <div id="messages" class="chat-box"></div>
  <div id="typing" class="typing"></div>

  <div class="input-box">
    <input id="msg" placeholder="Message..." oninput="typing()">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

  function scrollToBottom() {
  const chat = document.getElementById("messages");
  chat.scrollTop = chat.scrollHeight;
  }
  
const socket = io("https://YOUR-BACKEND-URL");

let name, room, myId = Math.random();

function join() {
  name = document.getElementById("username").value;
  room = document.getElementById("room").value;

  socket.emit("joinRoom", { room, name, id: myId });

  document.getElementById("joinScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";
}

function send() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  socket.emit("sendMessage", {
    room,
    message: msg,
    name,
    id: myId,
    time: new Date().toLocaleTimeString(),
    seen: false
  });

  document.getElementById("msg").value = "";
}

function typing() {
  socket.emit("typing", { room, name });
}

socket.on("typing", (data) => {
  document.getElementById("typing").innerText = data.name + " is typing...";
  setTimeout(() => document.getElementById("typing").innerText = "", 2000);
});

socket.on("message", (data) => {
  const div = document.createElement("div");

  div.className = "message " + (data.id === myId ? "sent" : "received");

  div.innerHTML = `
    <b>${data.name}</b><br>
    ${data.message}
    <div class="meta">${data.time}</div>
  `;

  const chat = document.getElementById("messages");
  chat.appendChild(div);

  scrollToBottom(); // 🔥 ADD THIS LINE
});

  document.getElementById("messages").appendChild(div);

  socket.emit("seen", { room });
});

socket.on("seen", () => {
  const metas = document.querySelectorAll(".meta");
  metas.forEach(m => {
    if (m.innerText.includes("✓")) {
      m.innerText = m.innerText.replace("✓", "✓✓");
    }
  });
});
</script>

</body>
</html>
